<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tripperz Offline</title>
    <style>
      body {
        font-family: Outfit, sans-serif;
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #f8f6f1;
        color: #0f172a;
      }
      .card {
        width: min(92vw, 380px);
        border-radius: 24px;
        border: 1px solid #e5e7eb;
        background: #fff;
        padding: 24px;
        box-shadow: 0 18px 44px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.3rem;
      }
      p {
        margin: 0;
        color: #64748b;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <section class="card">
      <h1>You are offline</h1>
      <p>Tripperz needs internet to refresh hotels, flights, and places. Your cached screens are still available.</p>
    </section>
  </body>
</html>
